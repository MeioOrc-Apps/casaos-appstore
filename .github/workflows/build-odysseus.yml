name: Build and Push Odysseus

on:
  push:
    branches: [main]
    paths:
      - 'Apps/Odysseus/**'
      - '.github/workflows/build-odysseus.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # weekly on Monday at 04:00 UTC

concurrency:
  group: build-odysseus
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: sergiosjs/odysseus
  ODYSSEUS_REPO: https://github.com/pewdiepie-archdaemon/odysseus.git
  ODYSSEUS_BRANCH: main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Odysseus source
        run: git clone --depth 1 --branch ${{ env.ODYSSEUS_BRANCH }} ${{ env.ODYSSEUS_REPO }} odysseus-src

      - name: Read upstream commit
        id: upstream
        run: echo "sha=$(cd odysseus-src && git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: odysseus-src
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:sha-${{ steps.upstream.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
