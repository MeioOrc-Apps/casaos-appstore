name: rag-orchestrator

networks:
  rag-network:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - rag-network
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    volumes:
      - /DATA/AppData/rag-orchestrator/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: sergiosjs/rag-orchestrator:2.3.1
    restart: unless-stopped
    networks:
      - rag-network
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8000"
      - "9700:9700"
    environment:
      DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@db:5432/orchestrator
      DOCLING_BASE_URL: http://host.docker.internal:5001
      OPENSEARCH_HOST: http://host.docker.internal:9200
      OPENSEARCH_INDEX_PREFIX: rag
      DEFAULT_OWNER_USERNAME: default
      SCAN_INTERVAL_MINUTES: "15"
      PARSE_INTERVAL_MINUTES: "5"
      TRANSLATE_INTERVAL_MINUTES: "5"
      INDEX_INTERVAL_MINUTES: "5"
      OLLAMA_HOST: http://host.docker.internal:11434
      OPENROUTER_API_KEY: ""
      MCP_PORT: "9700"
    volumes:
      - /DATA/AppData/rag-orchestrator/inputs:/data/inputs
    extra_hosts:
      - "host.docker.internal:host-gateway"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: sergio.sousa
  category: Productivity
  icon: https://cdn-icons-png.flaticon.com/512/4476/4476420.png
  title:
    custom: RAG Orchestrator
    en_us: RAG Orchestrator
  description:
    en_us: |
      RAG Orchestrator is an automated document ingestion and search pipeline
      powered by OpenSearch BM25 full-text search.

      It watches configured folders, detects new or changed files, converts
      documents to text, chunks and language-detects the content, optionally
      translates Portuguese to English via a local LLM (Ollama), and indexes
      everything into OpenSearch — all on a configurable schedule.

      **Features:**
      - Multi-format ingestion: Markdown, text, code, PDF, DOCX, PPTX, XLSX, images
      - BM25 full-text search across Portuguese and English content
      - LLM query enrichment (optional, via Ollama or OpenRouter)
      - MCP server on port 9700 for AI assistant integration
      - REST API for search, file management, and admin operations
      - Full web UI: folders, sync status, file browser, search, admin panel

      **v2.3 — Bidirectional translation + configurable prompts:**
      - Every document now produces both `content_pt` and `content_en` in the index
      - English documents are translated to Portuguese; Portuguese to English
      - All three LLM prompts (PT→EN, EN→PT, query enrichment) configurable in Admin UI
      - Previously hardcoded prompts now editable without restart

      **v2.2 — Settings UI + pipeline improvements:**
      - Admin settings page: configure LLM models, translation, chunking without restart
      - Translation and enrichment disabled by default — configure when needed
      - Parse job now processes files in configurable batches (default 20)
      - OPENSEARCH_HOST and INPUT_DIR have sensible defaults — fewer required env vars
      - DOCLING_BASE_URL optional — only needed for scanned PDFs / images via OCR

      **v2.1 — Full web UI:**
      - Search page: query box, domain filter, LLM enrichment toggle, results with score
      - Admin page: pipeline stats, failed file/chunk listing, retry/reindex/forcemerge
      - Files page: parse status filter, domain filter, per-file reindex and soft-delete
      - Responsive layout: sidebar collapses to bottom nav on mobile

      **v2.0 — OpenSearch module (replaces LightRAG):**
      - Chunking + language detection (langdetect, middle-sample strategy)
      - Translation pipeline (PT→EN via Ollama or OpenRouter)
      - BM25 indexing with PT+EN analyzers
      - Search API with optional LLM enrichment and fallback
      - Admin API (stats, retry-failed, reindex-all, forcemerge)
      - MCP server with search, list_files, get_stats, reindex_file tools
  tagline:
    en_us: Automated document pipeline — watch, chunk, translate, search
  port_map: "8080"
  index: /
  store_app_id: rag-orchestrator
  tips:
    before_install:
      en_us: |
        **Requirements before starting:**

        1. **OpenSearch** must be running — install the **OpenSearch** app from
           this store first. RAG Orchestrator connects to it via
           `http://host.docker.internal:9200` (the default `OPENSEARCH_HOST`).
           No changes needed if you installed OpenSearch with default settings.

        2. **Ollama** (optional) — required for LLM translation (bidirectional:
           PT→EN and EN→PT) and query enrichment. Set `OLLAMA_HOST` to your
           Ollama instance. If not configured, each document is indexed in its
           original language only and query enrichment is skipped.

        3. **Docling** (optional) — required only for **scanned PDFs and images**.
           Digital PDFs and Office files (DOCX, PPTX, XLSX) are converted
           in-process without Docling. Set `DOCLING_BASE_URL` only if you
           need OCR for scanned documents or image files.

        **After installation:**
        - Open the web UI at `http://[HOST-IP]:8080`
        - Go to Folders → add host paths to watch
        - Go to Status → click "Sync Now" to run immediately
        - MCP server available at `http://[HOST-IP]:9700` for AI assistant tools
