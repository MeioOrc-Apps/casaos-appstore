name: odysseus

networks:
  odysseus-network:
    driver: bridge

services:
  odysseus:
    image: sergiosjs/odysseus:latest
    restart: unless-stopped
    networks:
      - odysseus-network
    ports:
      - "7000:7000"
    volumes:
      - /DATA/AppData/odysseus/data:/app/data
      - /DATA/AppData/odysseus/logs:/app/logs
      - /DATA/AppData/odysseus/ssh:/app/.ssh
      - /DATA/AppData/odysseus/huggingface:/app/.cache/huggingface
      - /DATA/AppData/odysseus/local:/app/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_HOST=localhost
      - SEARXNG_INSTANCE=http://searxng:8080
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - DATABASE_URL=sqlite:///./data/app.db
      - AUTH_ENABLED=true
      - LOCALHOST_BYPASS=false
      - ODYSSEUS_ADMIN_USER=admin
      - SECURE_COOKIES=false
      - FASTEMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - CLEANUP_INTERVAL_HOURS=24
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started

  chromadb:
    image: docker.io/chromadb/chroma:latest
    restart: unless-stopped
    networks:
      - odysseus-network
    volumes:
      - /DATA/AppData/odysseus/chromadb:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE

  searxng:
    image: docker.io/searxng/searxng:2026.5.31-7159b8aed
    restart: unless-stopped
    networks:
      - odysseus-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -s /etc/searxng/settings.yml ] || grep -q '__SEARXNG_SECRET__' /etc/searxng/settings.yml; then
          secret="$${SEARXNG_SECRET:-}"
          if [ -z "$$secret" ]; then
            secret="$$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          fi
          printf 'use_default_settings: true\nserver:\n  secret_key: "%s"\nsearch:\n  formats:\n    - html\n    - json\n' "$$secret" > /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    volumes:
      - /DATA/AppData/odysseus/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s

  ntfy:
    image: docker.io/binwiederhier/ntfy
    command: serve
    restart: unless-stopped
    networks:
      - odysseus-network
    volumes:
      - /DATA/AppData/odysseus/ntfy:/var/cache/ntfy
    environment:
      - NTFY_BASE_URL=http://localhost:8091

x-casaos:
  architectures:
    - amd64
  main: odysseus
  author: sergio.sousa
  category: Productivity
  icon: https://cdn-icons-png.flaticon.com/512/4616/4616734.png
  title:
    custom: Odysseus
    en_us: Odysseus
  description:
    en_us: Self-hosted AI workspace. Chat, agents, deep research, memory, email, notes, and calendar — running on your own hardware.
  port_map: "7000"
  index: /
  store_app_id: odysseus
