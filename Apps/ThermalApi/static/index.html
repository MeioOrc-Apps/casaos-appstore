<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0; }

    :root {
      --bg:       oklch(96.5% 0.006 75);
      --surface:  oklch(100%  0     0);
      --border:   oklch(85%   0.012 75);
      --dim-line: oklch(91%   0.008 75);
      --stat-bg:  oklch(93.5% 0.007 75);

      --text:       oklch(14% 0.012 60);
      --text-dim:   oklch(38% 0.012 60);
      --text-faint: oklch(57% 0.010 60);

      /* Thermal panel — deep teal */
      --teal:   oklch(35% 0.130 192);
      --teal-l: oklch(35% 0.130 192 / 0.10);
      --teal-s: oklch(35% 0.130 192 / 0.06);

      /* ESP32 panel — deep amber */
      --amber:   oklch(44% 0.148 58);
      --amber-l: oklch(44% 0.148 58 / 0.10);
      --amber-s: oklch(44% 0.148 58 / 0.06);

      /* Temperature */
      --hot:    oklch(40% 0.215 25);
      --hot-l:  oklch(40% 0.215 25 / 0.08);
      --warm:   oklch(44% 0.148 58);
      --warm-l: oklch(44% 0.148 58 / 0.08);
      --cool:   oklch(36% 0.150 143);
      --cool-l: oklch(36% 0.150 143 / 0.08);

      --danger: oklch(40% 0.215 25);
      --success:oklch(36% 0.150 143);
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-l { display: flex; align-items: center; gap: 10px; }

    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
      animation: throb 2.6s ease-in-out infinite;
    }
    @keyframes throb {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.35; transform:scale(.82); }
    }

    .hdr-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .hdr-r { display: flex; align-items: center; gap: 14px; }

    .tick {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px; color: var(--text-faint); letter-spacing: .05em;
    }

    .btn-cfg {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); padding: 4px 10px;
      cursor: pointer; transition: border-color .12s, color .12s;
    }
    .btn-cfg:hover { border-color: var(--teal); color: var(--teal); }

    /* ── Settings drawer ── */
    .cfg-panel {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows .28s ease-out;
      overflow: hidden;
      background: var(--stat-bg);
      border-bottom: 1px solid var(--border);
    }
    .cfg-panel.open { grid-template-rows: 1fr; }
    .cfg-body { overflow: hidden; }
    .cfg-inner {
      padding: 18px 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      max-width: 720px;
    }
    .fld { display: flex; flex-direction: column; gap: 5px; }
    .fld-lbl { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-faint); }
    .fld-inp {
      font-family: 'Courier New', Courier, monospace; font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; outline: none;
      transition: border-color .12s; width: 100%;
    }
    .fld-inp:focus { border-color: var(--teal); }

    /* ── Emergency banner ── */
    .emerg {
      display: none;
      background: var(--hot); color: oklch(98% 0.008 25);
      text-align: center; padding: 9px 24px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      animation: flash .55s ease-in-out infinite alternate;
    }
    .emerg.on { display: block; }
    @keyframes flash { from{opacity:1} to{opacity:.55} }

    /* ── Main grid ── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; }

    /* ── Panels ── */
    .panel { padding: 26px 28px 52px; position: relative; background: var(--surface); }
    .panel-a { border-right: 1px solid var(--border); }

    .panel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .panel-name {
      font-size: 9px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
    }
    .panel-a .panel-name { color: var(--teal); }
    .panel-b .panel-name { color: var(--amber); }

    .chip { display: flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: .06em; color: var(--text-faint); }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok   { background: var(--success); }
    .dot-err  { background: var(--danger); }
    .dot-wait { background: var(--amber); animation: throb 1s ease-in-out infinite; }

    /* ── Error box ── */
    .err-box { display: none; border: 1px solid var(--danger); background: var(--hot-l); padding: 18px; text-align: center; }
    .err-box.on { display: block; }
    .err-title { font-family: 'Courier New', Courier, monospace; font-size: 11px; color: var(--danger); letter-spacing: .1em; margin-bottom: 6px; }
    .err-sub   { font-size: 9px; color: var(--text-faint); letter-spacing: .06em; }

    /* ── Big temperature ── */
    .big-t {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(52px, 9vw, 84px);
      font-weight: 400; line-height: 1;
      letter-spacing: -.02em;
      transition: color .35s ease;
      margin-bottom: 12px;
    }
    .big-t sup { font-size: .3em; vertical-align: super; font-weight: 300; margin-left: 2px; letter-spacing: 0; }
    .big-t.cool { color: var(--cool); }
    .big-t.warm { color: var(--warm); }
    .big-t.hot  { color: var(--hot);  }
    .big-t.nil  { color: var(--text-faint); }

    /* ── Trend badge ── */
    .trend-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      padding: 3px 10px 3px 8px; border: 1px solid;
      margin-bottom: 20px;
    }
    .trend-badge .arr { font-size: 13px; }
    .trend-badge.subida_brusca{ color:var(--hot);    border-color:var(--hot);    background:var(--hot-l);  }
    .trend-badge.subida_lenta { color:var(--warm);   border-color:var(--warm);   background:var(--warm-l); }
    .trend-badge.estavel      { color:var(--teal);   border-color:var(--teal);   background:var(--teal-s); }
    .trend-badge.queda        { color:var(--cool);   border-color:var(--cool);   background:var(--cool-l); }
    .trend-badge.warming_up,
    .trend-badge.unknown      { color:var(--text-faint); border-color:var(--border); background: transparent; }

    /* ── Emergency pill (inline) ── */
    .emerg-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      padding: 2px 9px; border: 1px solid; margin-left: 8px;
    }
    .emerg-pill.ok  { color: var(--cool);   border-color: var(--cool);   background: var(--cool-l); }
    .emerg-pill.bad { color: var(--danger); border-color: var(--danger); background: var(--hot-l);
                      animation: flash .55s ease-in-out infinite alternate; }

    /* ── Stats grid ── */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .stats-3 { grid-template-columns: 1fr 1fr 1fr; }
    .stat { background: var(--stat-bg); padding: 10px 12px; }
    .stat-lbl { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 3px; }
    .stat-val { font-family: 'Courier New', Courier, monospace; font-size: 16px; color: var(--text); }
    .stat-val.danger { color: var(--danger); font-weight: 700; }
    .stat-val.ok     { color: var(--success); }

    /* ── PWM bar ── */
    .pwm-wrap { margin-bottom: 20px; }
    .pwm-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .pwm-lbl  { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); }
    .pwm-pct  { font-family: 'Courier New', Courier, monospace; font-size: 18px; color: var(--amber); }
    .pwm-track{ display: flex; gap: 2px; height: 14px; }
    .seg { flex: 1; background: var(--dim-line); transition: background .22s; border: 1px solid var(--border); }
    .seg.on     { background: var(--amber); border-color: var(--amber); }
    .seg.on.hot { background: var(--hot);   border-color: var(--hot); }

    /* ── MOSFET LED ── */
    .mos-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .mos-lbl  { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-faint); flex: 1; }
    .led {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--dim-line);
      flex-shrink: 0; transition: all .3s;
    }
    .led.on { background: var(--success); border-color: var(--success); }
    .mos-state { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 700; letter-spacing: .1em; }
    .mos-state.on  { color: var(--success); }
    .mos-state.off { color: var(--text-faint); }

    /* ── Rule ── */
    .rule { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Extra sensors ── */
    .sensor {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: var(--stat-bg);
      border-left: 2px solid var(--amber); margin-bottom: 8px;
    }
    .sensor-name { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); }
    .sensor-val  { font-family: 'Courier New', Courier, monospace; font-size: 15px; }
    .sensor-val.cool { color: var(--cool); }
    .sensor-val.warm { color: var(--warm); }
    .sensor-val.hot  { color: var(--hot); }

    /* ── Timestamp row ── */
    .ts-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-top: 1px solid var(--dim-line); margin-top: 4px;
    }
    .ts-lbl { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); }
    .ts-val  { font-family: 'Courier New', Courier, monospace; font-size: 10px; color: var(--text-faint); }

    /* ── Panel footer ── */
    .panel-foot {
      position: absolute; bottom: 16px; right: 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px; color: var(--text-faint); letter-spacing: .06em;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .panel-a { border-right: none; border-bottom: 1px solid var(--border); }
      .panel { padding: 20px 16px 52px; }
      .cfg-inner { grid-template-columns: 1fr; }
      .hdr { padding: 12px 16px; }
      .big-t { font-size: clamp(48px, 14vw, 72px); }
      .stats-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="pulse"></div>
    <span class="hdr-title">Thermal Monitor</span>
  </div>
  <div class="hdr-r">
    <span class="tick" id="tick">—</span>
    <button class="btn-cfg" onclick="toggleCfg()">[config]</button>
  </div>
</header>

<div class="cfg-panel" id="cfg">
  <div class="cfg-body">
    <div class="cfg-inner">
      <div class="fld">
        <label class="fld-lbl" for="urlApi">Thermal API</label>
        <input class="fld-inp" id="urlApi" type="text" placeholder="/temp" oninput="saveCfg()">
      </div>
      <div class="fld">
        <label class="fld-lbl" for="urlEsp">ESP32 URL</label>
        <input class="fld-inp" id="urlEsp" type="text" placeholder="/esp32/status" oninput="saveCfg()">
      </div>
    </div>
  </div>
</div>

<div class="emerg" id="emerg">⚠ EMERGÊNCIA — FALHA CRÍTICA ⚠</div>

<div class="grid">

  <!-- Panel A: Thermal API -->
  <section class="panel panel-a">
    <div class="panel-hdr">
      <span class="panel-name">CPU Thermal</span>
      <div class="chip">
        <div class="dot dot-wait" id="aDot"></div>
        <span id="aTxt">aguardando</span>
      </div>
    </div>

    <div class="err-box" id="aErr">
      <div class="err-title">SEM CONEXÃO</div>
      <div class="err-sub" id="aErrSub">—</div>
    </div>

    <div id="aBody">
      <div class="big-t nil" id="aTemp">—<sup>°C</sup></div>
      <div class="trend-badge unknown" id="aTrend"><span class="arr">→</span> estável</div>

      <div class="stats stats-3">
        <div class="stat">
          <div class="stat-lbl">Taxa °C/s</div>
          <div class="stat-val" id="aRate">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Média janela</div>
          <div class="stat-val" id="aAvg">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Janela (s)</div>
          <div class="stat-val" id="aWindow">—</div>
        </div>
      </div>

      <div class="ts-row">
        <span class="ts-lbl">Leitura do sensor</span>
        <span class="ts-val" id="aTs">—</span>
      </div>
    </div>

    <div class="panel-foot" id="aFoot">—</div>
  </section>

  <!-- Panel B: ESP32 -->
  <section class="panel panel-b">
    <div class="panel-hdr">
      <span class="panel-name">ESP32 Controller</span>
      <div class="chip">
        <div class="dot dot-wait" id="bDot"></div>
        <span id="bTxt">aguardando</span>
      </div>
    </div>

    <div class="err-box" id="bErr">
      <div class="err-title">SEM CONEXÃO</div>
      <div class="err-sub" id="bErrSub">—</div>
    </div>

    <div id="bBody">
      <div class="big-t nil" id="bTemp">—<sup>°C</sup></div>

      <div style="display:flex; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:6px;">
        <div class="trend-badge unknown" id="bTrend" style="margin-bottom:0"><span class="arr">→</span> —</div>
        <span class="emerg-pill ok" id="bEmergPill">● normal</span>
      </div>

      <div class="pwm-wrap">
        <div class="pwm-meta">
          <span class="pwm-lbl">PWM Fan</span>
          <span class="pwm-pct" id="bPwm">—%</span>
        </div>
        <div class="pwm-track" id="pwmTrack"></div>
      </div>

      <div class="mos-row">
        <span class="mos-lbl">MOSFET</span>
        <div class="led" id="bLed"></div>
        <span class="mos-state off" id="bMos">—</span>
      </div>

      <hr class="rule">

      <div class="stats">
        <div class="stat">
          <div class="stat-lbl">Falhas</div>
          <div class="stat-val" id="bFail">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Uptime</div>
          <div class="stat-val" id="bUp">—</div>
        </div>
      </div>

      <div id="bSensors"></div>
    </div>

    <div class="panel-foot" id="bFoot">—</div>
  </section>

</div>

<script>
// ── PWM segments init ──
const SEGS = 20;
const track = document.getElementById('pwmTrack');
for (let i = 0; i < SEGS; i++) {
  const s = document.createElement('div');
  s.className = 'seg';
  track.appendChild(s);
}

// ── Settings ──
// Loaded from /config (env vars) on boot; localStorage overrides per-browser.
let DEFS = { urlApi: '/temp', urlEsp: '/esp32/status' };

function loadCfg() {
  const s = JSON.parse(localStorage.getItem('tm_cfg') || '{}');
  document.getElementById('urlApi').value = s.urlApi || DEFS.urlApi;
  document.getElementById('urlEsp').value = s.urlEsp || DEFS.urlEsp;
}
function saveCfg() {
  localStorage.setItem('tm_cfg', JSON.stringify({
    urlApi: document.getElementById('urlApi').value,
    urlEsp: document.getElementById('urlEsp').value,
  }));
}
function getCfg() {
  const s = JSON.parse(localStorage.getItem('tm_cfg') || '{}');
  return { urlApi: s.urlApi || DEFS.urlApi, urlEsp: s.urlEsp || DEFS.urlEsp };
}
function toggleCfg() {
  document.getElementById('cfg').classList.toggle('open');
}

// ── Helpers ──
function tc(t) {
  if (t == null) return 'nil';
  return t < 60 ? 'cool' : t < 75 ? 'warm' : 'hot';
}
function fmtUptime(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
        m = Math.floor((s % 3600) / 60), sc = s % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${sc}s`;
  if (m > 0) return `${m}m ${sc}s`;
  return `${sc}s`;
}
function hhmm() { return new Date().toTimeString().slice(0, 8); }
function fmtTs(unix) {
  const d = new Date(unix * 1000);
  return d.toTimeString().slice(0, 8);
}

const ARROWS = { subida_brusca:'↑↑', subida_lenta:'↑', estavel:'→', queda:'↓', warming_up:'⟳' };
const LABELS  = { subida_brusca:'subida brusca', subida_lenta:'subida lenta', estavel:'estável', queda:'queda', warming_up:'aquecendo…' };

function setTrend(el, dir) {
  el.className = `trend-badge ${dir || 'unknown'}`;
  el.innerHTML = `<span class="arr">${ARROWS[dir] || '?'}</span> ${LABELS[dir] || dir || '—'}`;
}
function setDot(dotId, txtId, state) {
  document.getElementById(dotId).className = `dot dot-${state}`;
  document.getElementById(txtId).textContent =
    state === 'ok' ? 'online' : state === 'err' ? 'offline' : 'aguardando';
}
function setPwm(pct) {
  const segs = track.querySelectorAll('.seg');
  const active = Math.round((pct / 100) * SEGS);
  segs.forEach((s, i) => {
    const on = i < active;
    s.className = 'seg' + (on ? (i >= SEGS * 0.8 ? ' on hot' : ' on') : '');
  });
}

const errs = { a: 0, b: 0 };

// ── Thermal API fetch ──
async function fetchA() {
  const url = getCfg().urlApi;
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    document.getElementById('aErr').classList.remove('on');
    document.getElementById('aBody').style.display = '';
    setDot('aDot', 'aTxt', 'ok');
    errs.a = 0;

    if (d.status === 'warming_up') {
      const el = document.getElementById('aTemp');
      el.className = 'big-t nil';
      el.innerHTML = '—<sup>°C</sup>';
      setTrend(document.getElementById('aTrend'), 'warming_up');
      document.getElementById('aRate').textContent = '—';
      document.getElementById('aAvg').textContent = '—';
      document.getElementById('aWindow').textContent = `${d.samples}/${d.required}`;
      document.getElementById('aTs').textContent = '—';
    } else {
      const t = d.current.temp_celsius;
      const el = document.getElementById('aTemp');
      el.className = `big-t ${tc(t)}`;
      el.innerHTML = `${t.toFixed(1)}<sup>°C</sup>`;

      setTrend(document.getElementById('aTrend'), d.trend.direction);

      const rate = d.trend.rate_of_change;
      document.getElementById('aRate').textContent = `${rate >= 0 ? '+' : ''}${rate.toFixed(3)}`;
      document.getElementById('aAvg').textContent = `${d.window_stats.average_temp.toFixed(1)}°C`;
      document.getElementById('aWindow').textContent = `${d.window_stats.window_size_seconds}s`;
      document.getElementById('aTs').textContent = fmtTs(d.current.timestamp);
    }

    document.getElementById('aFoot').textContent = `atualizado ${hhmm()}`;
  } catch (e) {
    errs.a++;
    document.getElementById('aErr').classList.add('on');
    document.getElementById('aBody').style.display = 'none';
    document.getElementById('aErrSub').textContent = `tentativa ${errs.a} · ${e.message}`;
    setDot('aDot', 'aTxt', 'err');
    document.getElementById('aFoot').textContent = `erro ${hhmm()}`;
  }
}

// ── ESP32 fetch ──
async function fetchB() {
  const url = getCfg().urlEsp;
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    document.getElementById('bErr').classList.remove('on');
    document.getElementById('bBody').style.display = '';
    setDot('bDot', 'bTxt', 'ok');
    errs.b = 0;

    // Emergency banner + inline pill
    document.getElementById('emerg').classList.toggle('on', !!d.emergency);
    const pill = document.getElementById('bEmergPill');
    if (d.emergency) {
      pill.className = 'emerg-pill bad';
      pill.textContent = '⚠ emergência';
    } else {
      pill.className = 'emerg-pill ok';
      pill.textContent = '● normal';
    }

    // Temp
    const t = d.temp_api;
    const el = document.getElementById('bTemp');
    el.className = `big-t ${tc(t)}`;
    el.innerHTML = `${t}<sup>°C</sup>`;

    // Trend
    setTrend(document.getElementById('bTrend'), d.trend);

    // PWM
    document.getElementById('bPwm').textContent = `${d.pwm_pct}%`;
    setPwm(d.pwm_pct);

    // Mosfet
    const led = document.getElementById('bLed');
    const mos = document.getElementById('bMos');
    led.className = d.mosfet_on ? 'led on' : 'led';
    mos.className  = d.mosfet_on ? 'mos-state on' : 'mos-state off';
    mos.textContent = d.mosfet_on ? 'ON' : 'OFF';

    // Fail count
    const fail = document.getElementById('bFail');
    fail.textContent = d.fail_count;
    fail.className = `stat-val${d.fail_count > 0 ? ' danger' : ' ok'}`;

    // Uptime
    document.getElementById('bUp').textContent = fmtUptime(d.uptime_ms);

    // Extra sensors
    const sensors = document.getElementById('bSensors');
    sensors.innerHTML = '';
    if (d.temp_ds18 != null)
      sensors.innerHTML += `<div class="sensor"><span class="sensor-name">DS18B20</span><span class="sensor-val ${tc(d.temp_ds18)}">${d.temp_ds18}°C</span></div>`;
    if (d.temp_bmp != null)
      sensors.innerHTML += `<div class="sensor"><span class="sensor-name">BMP280</span><span class="sensor-val ${tc(d.temp_bmp)}">${d.temp_bmp}°C</span></div>`;

    document.getElementById('bFoot').textContent = `atualizado ${hhmm()}`;
  } catch (e) {
    errs.b++;
    document.getElementById('bErr').classList.add('on');
    document.getElementById('bBody').style.display = 'none';
    document.getElementById('bErrSub').textContent = `tentativa ${errs.b} · ${e.message}`;
    setDot('bDot', 'bTxt', 'err');
    document.getElementById('bFoot').textContent = `erro ${hhmm()}`;
  }
}

function poll() {
  document.getElementById('tick').textContent = hhmm();
  Promise.allSettled([fetchA(), fetchB()]);
}

// Boot: fetch server config (env vars), then apply localStorage overrides, then start polling.
fetch('/config')
  .then(r => r.json())
  .then(cfg => {
    if (cfg.thermal_url) DEFS.urlApi = cfg.thermal_url;
    if (cfg.esp32_url)   DEFS.urlEsp  = cfg.esp32_url;
  })
  .catch(() => { /* use hardcoded defaults */ })
  .finally(() => {
    loadCfg();
    poll();
    setInterval(poll, 2000);
  });
</script>
