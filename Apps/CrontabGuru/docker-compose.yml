name: crontab-guru

services:
  crontab-guru:
    image: sergiosjs/crontab-guru-dashboard:0.1.0
    container_name: crontab-guru
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DASH_USERNAME: admin
      DASH_PASSWORD: TROQUE_AQUI
      DASH_PORT: "9000"
      TZ: America/Sao_Paulo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/crontab-guru/crontabs:/etc/crontabs
      - /DATA/AppData/crontab-guru/config:/etc/cronitor

x-casaos:
  architectures:
    - amd64
    - arm64
  main: crontab-guru
  author: sergio.sousa
  category: Utilities
  icon: https://cdn-icons-png.flaticon.com/512/3652/3652191.png
  title:
    custom: Crontab Guru
    en_us: Crontab Guru
  description:
    en_us: Web UI to manage cron jobs with plain-English schedule preview. Cron daemon runs inside the container so jobs actually execute. Can start/stop Docker containers on schedule via mounted socket. Jobs persist across reboots via bind mounts.
  port_map: "9000"
  index: /
  store_app_id: crontab-guru
